<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="assets/viewport-fit.js"></script>
  <title>RP 房 · 代号Life</title>
  <link rel="stylesheet" href="assets/global.css">
  <link rel="stylesheet" href="assets/components.css?v=107">

</head>
<body>

<div class="app">
  <header class="top-row"></header>
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="paper-board">

      <div class="center-tabs" id="rpTabs">
        <span class="center-tab active" data-tab="sub">我的订阅</span>
        <span class="center-tab" data-tab="all">全部直播</span>
      </div>

      <div class="cards-wrap">
        <section class="cards-area" id="cardsArea">
          <div class="cards-grid" id="grid"></div>
        </section>
        <div class="scrollbar" id="scrollbar">
          <div class="scrollbar-thumb" id="scrollThumb"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="assets/shell.js?v=41"></script>
<script src="assets/detail-popup.js?v=65"></script>
<script>
renderSidebar('rp');
renderTopRow({ showFilter: true, showSort: true, showSearch: true, sortLabel: '最新排序' });

// 排序：游玩人数 → 在线人数
buildSortPanel([
  { label: '综合' },
  { label: '最新' },
  { label: '最热' },
  { label: '在线人数' },
], '最新');

const grid = document.getElementById('grid');
const cardsArea = document.getElementById('cardsArea');
const tabScrollTop = { sub: 0, all: 0 };
let currentTab = 'sub';
let currentPager = null;

function loadTab(tab) {
  if (currentPager) currentPager.destroy();
  currentPager = setupPagedCardGrid({
    grid,
    area: cardsArea,
    items: makeLiveCards(36, tab === 'sub'),
  });

  requestAnimationFrame(() => {
    cardsArea.scrollTop = tabScrollTop[tab];
    cardsArea.dispatchEvent(new Event('scroll'));
  });
}
loadTab('sub');

document.querySelectorAll('#rpTabs .center-tab').forEach(t => {
  t.onclick = () => {
    const nextTab = t.dataset.tab;
    if (nextTab === currentTab) return;

    tabScrollTop[currentTab] = cardsArea.scrollTop;
    document.querySelectorAll('#rpTabs .center-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentTab = nextTab;
    loadTab(currentTab);
  };
});

setupScrollbar();

/* RP 房筛选 - 完整内容 */
window.openFilter = function() {
  const mask = document.createElement('div');
  mask.className = 'modal-mask';
  mask.innerHTML = `
    <div class="modal-popup" onclick="event.stopPropagation()">
      <div class="modal-close"><img src="assets/img/btn-close.png" alt="关闭"></div>
      <div class="modal-header">
        <img class="ic" src="assets/img/btn-filter-active.png" alt=""> 筛选
      </div>

      <div class="filter-section">
        <div class="filter-options cols-2">
          <div class="filter-option active"><span class="radio"></span><span>朋友在玩</span></div>
          <div class="filter-option active"><span class="radio"></span><span>可加入</span></div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label-row">
          <div class="filter-label">玩法（可多选）</div>
        </div>
        <div class="filter-options">
          <div class="filter-option"><span class="radio"></span><span>玩法类型</span></div>
          <div class="filter-option active"><span class="radio"></span><span>玩法类型</span></div>
          <div class="filter-option"><span class="radio"></span><span>玩法类型</span></div>
          <div class="filter-option"><span class="radio"></span><span>玩法类型</span></div>
          <div class="filter-option"><span class="radio"></span><span>玩法类型</span></div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label-row">
          <div class="filter-label">游玩人数（可多选）</div>
        </div>
        <div class="filter-options">
          <div class="filter-option active"><span class="radio"></span><span>单人</span></div>
          <div class="filter-option active"><span class="radio"></span><span>双人</span></div>
          <div class="filter-option"><span class="radio"></span><span>3-6人</span></div>
          <div class="filter-option"><span class="radio"></span><span>6人以上</span></div>
        </div>
      </div>

      <div class="filter-actions">
        <button class="btn-pill btn-reset">重置</button>
        <button class="btn-pill btn-confirm">确认</button>
      </div>
    </div>
  `;
  document.body.appendChild(mask);

  const fb = document.getElementById('filterBtn');
  function close() { mask.remove(); }   // 关闭不改变筛选状态

  mask.onclick = close;
  mask.querySelector('.modal-close').onclick = close;
  mask.querySelectorAll('.filter-option').forEach(opt => {
    opt.onclick = () => {
      opt.classList.toggle('active');
      // 修改了筛选条件 → 切换到激活图标
      if (fb) fb.querySelector('img').src = 'assets/img/btn-filter-active.png';
    };
  });
  mask.querySelector('.btn-reset').onclick = () => {
    mask.querySelectorAll('.filter-option').forEach(o => o.classList.remove('active'));
    // 重置回默认筛选图标
    if (fb) fb.querySelector('img').src = 'assets/img/btn-filter-default.png';
  };
  mask.querySelector('.btn-confirm').onclick = close;
};
</script>
</body>
</html>
