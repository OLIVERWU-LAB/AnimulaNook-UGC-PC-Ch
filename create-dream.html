<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>创建家装方案</title>
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/global.css">
<link rel="stylesheet" href="assets/components.css">
<link rel="stylesheet" href="assets/pages.css">
</head>
<body>
<div class="app">
  <header class="top-row"></header>
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="paper-board"></div>
  </main>
</div>

<!-- 创建家装方案大弹窗 -->
<div class="modal-mask mask-60" id="mask">
  <div class="big-popup" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="history.back()">
      <img src="assets/img/btn-close.png" alt="关闭">
    </button>
    <div class="big-popup-inner">
      <div class="big-popup-title">
        <span>创建家装方案</span>
      </div>

      <div class="create-grid">
        <!-- 左：上传封面 -->
        <div class="upload-cover-area">
          <label class="upload-cover">
            <div class="upload-cover-icon">
              <div class="plus">+</div>
              <div>上传封面</div>
            </div>
          </label>
        </div>

        <!-- 右：表单 -->
        <div class="create-form">
          <div class="create-form-scroll">
            <div class="form-row">
              <div class="form-label">标题</div>
              <input class="form-input" placeholder="请输入标题（不超过15字）" maxlength="15">
            </div>

            <div class="form-row">
              <div class="form-label">介绍</div>
              <div class="form-textarea-wrap">
                <textarea class="form-textarea" placeholder="请输入家装方案介绍，最多 150 字" maxlength="150" oninput="document.getElementById('introCount').textContent=this.value.length"></textarea>
                <span class="count"><span id="introCount">0</span>/150</span>
              </div>
            </div>

            <div class="form-row">
              <div class="form-label">玩法</div>
              <div class="form-pills" data-mode="single">
                <span class="form-pill active">观赏</span>
                <span class="form-pill">休闲</span>
                <span class="form-pill">解谜</span>
                <span class="form-pill">剧情</span>
                <span class="form-pill">社交</span>
              </div>
            </div>

            <div class="form-row">
              <div class="form-label">地块</div>
              <div class="form-select">
                <span>请选择地块</span>
                <span class="caret"></span>
              </div>
            </div>

            <div class="form-row">
              <div class="form-label">人数</div>
              <div class="form-select">
                <span>请选择最大人数（1-6）</span>
                <span class="caret"></span>
              </div>
            </div>

            <div class="form-row">
              <div class="form-label">权限</div>
              <div class="form-perms">
                <span class="perm-item active"><span class="check"></span>公开</span>
                <span class="perm-item"><span class="check"></span>仅好友可见</span>
                <span class="perm-item"><span class="check"></span>仅自己可见</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="big-popup-bottombar">
      <button class="btn-mini btn-yellow" onclick="history.back()">取消</button>
      <button class="btn-mini btn-green" onclick="alert('已创建')">确认创建</button>
      <span class="meta" id="saveDraft">
        <span class="check"></span>保存为草稿
      </span>
    </div>
  </div>
</div>

<script src="assets/shell.js?v=33"></script>
<script>
renderSidebar('mine');
renderTopRow({ showFilter: false, showSort: false, showSearch: false });

// 玩法单选
document.querySelectorAll('.form-pills[data-mode="single"] .form-pill').forEach(p => {
  p.onclick = () => {
    p.parentElement.querySelectorAll('.form-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
  };
});

// 权限单选
document.querySelectorAll('.perm-item').forEach(p => {
  p.onclick = () => {
    p.parentElement.querySelectorAll('.perm-item').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
  };
});

// 保存为草稿勾选
document.getElementById('saveDraft').onclick = (e) => {
  const c = e.currentTarget.querySelector('.check');
  c.classList.toggle('on');
  c.style.background = c.classList.contains('on') ? '#A8B544' : 'transparent';
};
</script>
</body>
</html>
