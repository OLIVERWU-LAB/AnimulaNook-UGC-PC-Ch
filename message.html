<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="assets/viewport-fit.js"></script>
  <title>消息中心 · 代号Life</title>
  <link rel="stylesheet" href="assets/global.css">
  <link rel="stylesheet" href="assets/components.css?v=107">
  <link rel="stylesheet" href="assets/pages.css?v=6">
</head>
<body>

<div class="app">
  <header class="top-row"></header>
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="paper-board paper-board--message">

      <div class="center-tabs" id="msgTabs">
        <span class="center-tab active" data-tab="like">赞赞<span class="tab-badge"></span></span>
        <span class="center-tab" data-tab="comment">评论<span class="tab-badge"></span></span>
        <span class="center-tab" data-tab="follow">关注<span class="tab-badge"></span></span>
        <span class="center-tab" data-tab="system">系统<span class="tab-badge"></span></span>
      </div>

      <div class="cards-wrap">
        <section class="cards-area" id="cardsArea">
          <div class="msg-list" id="msgList"></div>
          <div class="msg-loader" id="msgLoader" hidden aria-label="正在加载更多">
            <span></span><span></span><span></span>
          </div>
        </section>
        <div class="scrollbar" id="scrollbar">
          <div class="scrollbar-thumb" id="scrollThumb"></div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="assets/shell.js?v=41"></script>
<script src="assets/detail-popup.js?v=65"></script>
<script>
renderSidebar('message');
renderTopRow({ showFilter: false, showSort: false, showSearch: false });

const COVER = 'assets/img/card-cover-dream.png';
const LIVE_COVER = 'assets/img/card-cover-live.png';
const AVATAR = 'assets/img/avatar-demo.png';
const TITLE_SNIP = '家装方案标题支持最多12个字';
const LIVE_TITLE_SNIP = '直播间标题支持最多12个字';

const data = {
  like: [
    { unread: true,  name: '作者昵称七个字', kind: 'like', action: '赞了',     target: `你的家装方案【${TITLE_SNIP}】`, time: '20:49' },
    { unread: true,  name: '作者昵称七个字', kind: 'like', action: '等8人赞了', target: `你的家装方案【${TITLE_SNIP}】`, time: '昨天 20:49' },
    { unread: false, name: '作者昵称七个字', kind: 'star', action: '收藏了',   target: `你的家装方案【${TITLE_SNIP}】`, time: '20:49' },
    { unread: false, name: '作者昵称七个字', kind: 'star', action: '等7人收藏了', target: `你的家装方案【${TITLE_SNIP}】`, time: '昨天 20:49' },
  ],
  comment: [
    { unread: true,  name: '作者昵称七个字', action: '评论了你', text: '哇，这个真的太好玩了，怎么还没火呢？这真是一个令人惊叹的地方，值得推荐给所有人！', time: '20:49',       liked: false },
    { unread: true,  name: '作者昵称七个字', action: '回复了你', text: '谢谢分享！我也想去看看这个梦境，感觉氛围特别好。',                                   time: '昨天 20:49', liked: true  },
    { unread: false, name: '作者昵称七个字', action: '评论了你', text: '配色太舒服了，能出个教程吗？',                                                       time: '20:49',       liked: false },
    { unread: false, name: '作者昵称七个字', action: '评论了你', text: '这个布局很有故事感，喜欢！',                                                         time: '昨天 20:49', liked: true  },
  ],
  follow: [
    { unread: true,  name: '作者昵称七个字', time: '昨天 20:49',  state: 'back'     },
    { unread: false, name: '作者昵称七个字', time: '昨天 20:49',  state: 'followed' },
    { unread: false, name: '作者昵称七个字', time: '昨天 20:49',  state: 'back'     },
  ],
  system: [
    { unread: true,  alert: '',               text: `你的【${TITLE_SNIP}】审核成功，已发布`,                         time: '20:49',       btn: { label: '去看看',  tone: 'yellow' } },
    { unread: true,  alert: '审核失败',        text: `你的【${TITLE_SNIP}】审核失败：请注意修改措辞，重新上传地图`,           time: '20:49',       btn: { label: '去编辑',  tone: 'blue' } },
    { unread: false, alert: '',               text: `你举报的【${TITLE_SNIP}】举报成功，该梦境已下架`,        time: '20:49',       btn: null },
    { unread: false, alert: '',               text: '举报成功【玩家昵称】在【内容标题】的评论，已禁止该玩家的评论功能7天',   time: '20:49',       btn: null },
    { unread: false, alert: '被举报',          text: `你的【${TITLE_SNIP}】被举报：涉政`,                         time: '20:49',       btn: { label: '去申诉',  tone: 'outline' } },
    { unread: false, alert: '被举报',          text: `你的【${TITLE_SNIP}】的评论【评论内容…】被举报`,                       time: '20:49',       btn: { label: '去申诉',  tone: 'outline' } },
    { unread: false, alert: '违规提示',         text: `你的直播间【${LIVE_TITLE_SNIP}】涉及违规内容，请注意直播环境`,           time: '20:49',       btn: null, cover: LIVE_COVER },
    { unread: false, alert: '',               text: `你预约的【${LIVE_TITLE_SNIP}】直播已取消，去看看其他的吧~`,       time: '20:49',       btn: null, cover: LIVE_COVER },
    { unread: false, alert: '',               text: '恭喜！你的内容【内容标题】被官方推荐上【榜单名称】',     time: '20:49',       btn: null },
  ],
};

const tabs = document.querySelectorAll('#msgTabs .center-tab');
const list = document.getElementById('msgList');
const cardsArea = document.getElementById('cardsArea');
const loader = document.getElementById('msgLoader');
const BATCH_SIZE = 20;
const LOAD_DELAY = 600;
const TOTALS = { like: 48, comment: 12, follow: 9, system: 27 };
const unreadState = getMessageUnreadState();

function buildMessages(items, total, unreadCount) {
  return Array.from({ length: total }, (_, index) => ({
    ...items[index % items.length],
    messageId: index,
    commentIndex: index % 4,
    unread: index < unreadCount,
  }));
}

const expandedData = Object.fromEntries(
  Object.entries(data).map(([key, items]) => [
    key,
    buildMessages(items, TOTALS[key], unreadState[key]),
  ])
);

const tabState = Object.fromEntries(
  Object.keys(data).map(key => [key, { rendered: 0, scrollTop: 0 }])
);
let currentTab = 'like';
let isLoading = false;
let isRestoringScroll = false;

function updateBadges() {
  tabs.forEach(tab => {
    const unreadCount = unreadState[tab.dataset.tab];
    const badge = tab.querySelector('.tab-badge');
    badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
    badge.hidden = unreadCount === 0;
  });
}

function markTabRead(tabKey) {
  if (!unreadState[tabKey]) return;
  unreadState[tabKey] = 0;
  expandedData[tabKey].forEach(item => { item.unread = false; });
  setMessageUnreadState(unreadState);
  updateBadges();
}

updateBadges();

function renderAvatar(grouped = false) {
  if (!grouped) {
    return `<div class="msg-av" style="background-image:url(${AVATAR})"></div>`;
  }
  return `
    <div class="msg-av-stack" aria-label="多人头像">
      <span class="msg-av-small msg-av-small--back" style="background-image:url(${AVATAR})"></span>
      <span class="msg-av-small msg-av-small--front" style="background-image:url(${AVATAR})"></span>
    </div>`;
}

function actionIcon(kind) {
  if (kind === 'star') return '<img class="msg-action-icon" src="assets/img/icon-star-mini.png" alt="">';
  return '<img class="msg-action-icon" src="assets/img/like-mini.png" alt="">';
}

function renderLike(items) {
  return items.map(it => `
    <article class="msg-row${it.unread ? ' is-unread' : ''}" data-message-id="${it.messageId}">
      ${it.unread ? '<span class="msg-unread-dot" aria-label="未读"></span>' : ''}
      ${renderAvatar(it.action.startsWith('等'))}
      <div class="msg-body">
        <div class="msg-line1">
          <span class="msg-name">${it.name}</span>
          ${actionIcon(it.kind)}
          <span class="msg-action">${it.action}</span>
        </div>
        <div class="msg-line2">
          <span class="msg-desc">${it.target}</span>
          <span class="msg-time">${it.time}</span>
        </div>
      </div>
      <div class="msg-thumb" data-open-detail="dream" style="background-image:url(${COVER})"></div>
    </article>
  `).join('');
}

function renderComment(items) {
  return items.map(it => `
    <article class="msg-row msg-row--comment${it.unread ? ' is-unread' : ''}" data-message-id="${it.messageId}" data-comment-index="${it.commentIndex}">
      ${it.unread ? '<span class="msg-unread-dot" aria-label="未读"></span>' : ''}
      <div class="msg-av" style="background-image:url(${AVATAR})"></div>
      <div class="msg-body">
        <div class="msg-line1">
          <span class="msg-name">${it.name}</span>
          <span class="msg-action">${it.action}</span>
        </div>
        <div class="msg-line2">
          <span class="msg-comment-text">${it.text}</span>
          <span class="msg-time">${it.time}</span>
        </div>
      </div>
      <div class="msg-side-actions">
        <button type="button" class="msg-reply-btn">回复</button>
        <button type="button" class="msg-like-circle${it.liked ? ' is-liked' : ''}" aria-label="赞"></button>
      </div>
      <div class="msg-thumb" data-open-detail="comment" style="background-image:url(${COVER})"></div>
    </article>
  `).join('');
}

function renderFollow(items) {
  return items.map(it => `
    <article class="msg-row msg-row--follow${it.unread ? ' is-unread' : ''}" data-message-id="${it.messageId}">
      ${it.unread ? '<span class="msg-unread-dot" aria-label="未读"></span>' : ''}
      <div class="msg-av" style="background-image:url(${AVATAR})"></div>
      <div class="msg-body">
        <div class="msg-line1">
          <span class="msg-name">${it.name}</span>
          <span class="msg-action">关注了你</span>
        </div>
        <div class="msg-line2">
          <span class="msg-time">${it.time}</span>
        </div>
      </div>
      <button type="button" class="msg-follow-btn${it.state === 'followed' ? ' is-followed' : ''}">
        ${it.state === 'followed' ? '已关注' : '回关'}
      </button>
    </article>
  `).join('');
}

function renderSystem(items) {
  return items.map(it => {
    const alert = it.alert
      ? `<span class="msg-sys-alert">! ${it.alert}</span>`
      : '';
    const btn = it.btn
      ? `<button type="button" class="msg-sys-btn msg-sys-btn--${it.btn.tone}" data-system-action="${it.btn.label}">${it.btn.label}</button>`
      : '';
    return `
    <article class="msg-row msg-row--system${it.unread ? ' is-unread' : ''}">
      ${it.unread ? '<span class="msg-unread-dot" aria-label="未读"></span>' : ''}
      <div class="msg-sys-icon" aria-hidden="true"></div>
      <div class="msg-body">
        <div class="msg-line1 msg-line1--system">
          <span class="msg-sys-label">官方系统消息</span>
          ${alert}
        </div>
        <div class="msg-line2 msg-line2--system">
          <span class="msg-desc">${it.text}</span>
          <span class="msg-time">${it.time}</span>
        </div>
      </div>
      ${btn}
      <div class="msg-thumb msg-thumb--static" style="background-image:url(${it.cover || COVER})"></div>
    </article>`;
  }).join('');
}

function renderItems(tab, items) {
  const map = {
    like:    () => renderLike(items),
    comment: () => renderComment(items),
    follow:  () => renderFollow(items),
    system:  () => renderSystem(items),
  };
  return map[tab]();
}

function appendNextBatch(tab) {
  const state = tabState[tab];
  const items = expandedData[tab];
  const next = items.slice(state.rendered, state.rendered + BATCH_SIZE);
  list.insertAdjacentHTML('beforeend', renderItems(tab, next));
  state.rendered += next.length;
  cardsArea.dispatchEvent(new Event('scroll'));
}

function render(tab) {
  const state = tabState[tab];
  const targetScrollTop = state.scrollTop;
  isRestoringScroll = true;
  list.innerHTML = '';
  loader.hidden = true;
  isLoading = false;
  if (state.rendered === 0) {
    appendNextBatch(tab);
  } else {
    list.innerHTML = renderItems(tab, expandedData[tab].slice(0, state.rendered));
  }
  cardsArea.scrollTop = targetScrollTop;
  setTimeout(() => {
    cardsArea.scrollTop = targetScrollTop;
    cardsArea.dispatchEvent(new Event('scroll'));
    setTimeout(() => { isRestoringScroll = false; }, 0);
  }, 0);
}

function loadMore() {
  const state = tabState[currentTab];
  if (isLoading || state.rendered >= expandedData[currentTab].length) return;
  const loadingTab = currentTab;
  isLoading = true;
  loader.hidden = false;
  setTimeout(() => {
    if (currentTab === loadingTab) {
      loader.hidden = true;
      appendNextBatch(loadingTab);
    }
    isLoading = false;
  }, LOAD_DELAY);
}

tabs.forEach(t => {
  t.onclick = () => {
    const nextTab = t.dataset.tab;
    if (nextTab === currentTab) return;
    tabState[currentTab].scrollTop = cardsArea.scrollTop;
    isRestoringScroll = true;
    markTabRead(currentTab);
    tabs.forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentTab = nextTab;
    render(currentTab);
  };
});

cardsArea.addEventListener('scroll', () => {
  if (isRestoringScroll) return;
  tabState[currentTab].scrollTop = cardsArea.scrollTop;
  const distanceToBottom = cardsArea.scrollHeight - cardsArea.clientHeight - cardsArea.scrollTop;
  if (distanceToBottom < 180) loadMore();
}, { passive: true });

list.addEventListener('click', event => {
  const followButton = event.target.closest('.msg-follow-btn');
  if (followButton) {
    const row = followButton.closest('.msg-row');
    const item = expandedData.follow.find(message => String(message.messageId) === row.dataset.messageId);
    const willFollow = !followButton.classList.contains('is-followed');
    followButton.classList.toggle('is-followed', willFollow);
    followButton.textContent = willFollow ? '已关注' : '回关';
    if (item) item.state = willFollow ? 'followed' : 'back';
    showPageToast(willFollow ? '已成功关注～' : '已成功取消关注', document.querySelector('.paper-board--message'));
    return;
  }

  const likeButton = event.target.closest('.msg-like-circle');
  if (likeButton) {
    likeButton.classList.toggle('is-liked');
    const row = likeButton.closest('.msg-row');
    const item = expandedData.comment.find(message => String(message.messageId) === row.dataset.messageId);
    if (item) item.liked = likeButton.classList.contains('is-liked');
    return;
  }

  const replyButton = event.target.closest('.msg-reply-btn');
  if (replyButton) {
    const row = replyButton.closest('.msg-row');
    window.openDetailPopup({
      kind: 'dream',
      title: TITLE_SNIP,
      cover: COVER,
      tag: '玩法标签',
      featured: true,
      focusCommentIndex: Number(row.dataset.commentIndex || 0),
      autoReply: true,
    });
    return;
  }

  const systemButton = event.target.closest('.msg-sys-btn[data-system-action]');
  if (systemButton) {
    if (systemButton.dataset.systemAction === '去看看') {
      window.openDetailPopup({
        kind: 'dream',
        title: TITLE_SNIP,
        cover: COVER,
        tag: '玩法标签',
        featured: true,
      });
    } else if (systemButton.dataset.systemAction === '去编辑') {
      window.openCreateDreamPopup({ cover: COVER });
    }
    return;
  }

  const thumb = event.target.closest('.msg-thumb[data-open-detail]');
  if (!thumb) return;
  const row = thumb.closest('.msg-row');
  const opts = {
    kind: 'dream',
    title: TITLE_SNIP,
    cover: COVER,
    tag: '玩法标签',
    featured: true,
  };
  if (thumb.dataset.openDetail === 'comment') {
    opts.focusCommentIndex = Number(row.dataset.commentIndex || 0);
  }
  window.openDetailPopup(opts);
});

render(currentTab);
setupScrollbar();
</script>
</body>
</html>
