<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1">
  <title>我的社交 · 代号Life</title>
  <link rel="stylesheet" href="assets/global.css">
  <link rel="stylesheet" href="assets/components.css">
  <link rel="stylesheet" href="assets/pages.css">
</head>
<body>

<div class="app" style="grid-template-columns: 1fr;">

  <header class="search-page-top">
    <div class="solo-title">
      <span class="ic"><img src="assets/img/icon-people.png" alt=""></span>
      <span>我的社交</span>
    </div>
    <div class="spacer"></div>
    <button class="topbar-btn btn-close" onclick="history.back()" title="关闭">
      <img src="assets/img/btn-close.png" alt="关闭">
    </button>
  </header>

  <main class="search-page-main">
    <div class="search-page-board">

      <div class="center-tabs" id="socialTabs">
        <span class="center-tab" data-tab="follow">关注</span>
        <span class="center-tab active" data-tab="mutual">互关</span>
        <span class="center-tab" data-tab="fans">粉丝</span>
      </div>

      <div class="section-title" id="sectionTitle">
        <span class="name" id="sectionName">我的互关</span>
        <span class="count" id="sectionCount">（7个）</span>
      </div>

      <div class="cards-wrap">
        <section class="cards-area" id="cardsArea" style="padding-right: 124px;">
          <div class="social-list" id="list"></div>
        </section>
        <div class="scrollbar" id="scrollbar">
          <div class="scrollbar-thumb" id="scrollThumb"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="assets/shell.js?v=33"></script>
<script>
const TAB_INFO = {
  follow: { name: '我的关注', count: '24个', btnClass: 'followed', btnText: '已关注',  n: 12 },
  mutual: { name: '我的互关', count: '7个',  btnClass: 'followed', btnText: '互相关注', n: 7  },
  fans:   { name: '我的粉丝', count: '124个', btnClass: 'back',     btnText: '回关',    n: 14 },
};

function loadSocial(tab) {
  const cfg = TAB_INFO[tab];
  document.getElementById('sectionName').textContent  = cfg.name;
  document.getElementById('sectionCount').textContent = `（${cfg.count}）`;

  document.querySelectorAll('#socialTabs .center-tab').forEach(p => p.classList.toggle('active', p.dataset.tab === tab));

  document.getElementById('list').innerHTML = Array.from({ length: cfg.n }, () => `
    <div class="social-row">
      <div class="av"></div>
      <div class="info">
        <div class="name">作者昵称七个字</div>
        <div class="meta">粉丝 1.2w</div>
      </div>
      <button class="btn-follow ${cfg.btnClass}">${cfg.btnText}</button>
    </div>
  `).join('');

  setTimeout(setupScrollbar, 50);
}

document.querySelectorAll('#socialTabs .center-tab').forEach(p => p.onclick = () => loadSocial(p.dataset.tab));

const initialTab = new URLSearchParams(location.search).get('tab') || 'mutual';
loadSocial(initialTab);
setupScrollbar();
</script>
</body>
</html>
