<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1">
  <title>官方推荐 · 代号Life</title>
  <link rel="stylesheet" href="assets/global.css">
</head>
<body>

<div class="app">

  <!-- ===== 顶行 ===== -->
  <header class="top-row">
    <div class="system-title">
      <span class="home-icon" title="首页">
        <img src="assets/img/icon-home.png" alt="首页">
      </span>
      <span>梦境 &amp; RP房</span>
    </div>

    <div class="spacer"></div>

    <button class="topbar-btn btn-filter" id="filterBtn" title="筛选">
      <img src="assets/img/btn-filter-default.png" alt="筛选">
    </button>

    <button class="topbar-btn sort-dropdown" title="排序">
      <span>最新排序</span>
      <span class="caret"></span>
    </button>

    <div class="topbar-btn search-box">
      <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
      </svg>
      <input type="text" placeholder="搜索">
    </div>

    <button class="topbar-btn btn-close" title="关闭">
      <img src="assets/img/btn-close.png" alt="关闭">
    </button>
  </header>

  <!-- ===== 左侧 ICON 导航 ===== -->
  <aside class="sidebar">
    <a class="nav-item active" data-key="recommend" href="index.html" title="官方推荐">
      <div class="nav-icon-wrap">
        <div class="icon-off" style="background-image:url('assets/icons/nav-recommend-off.png');"></div>
        <div class="icon-on"  style="background-image:url('assets/icons/nav-recommend-on.png');"></div>
      </div>
      <span class="nav-label">官方推荐</span>
    </a>
    <a class="nav-item" data-key="weekly" href="weekly.html" title="每周推荐">
      <div class="nav-icon-wrap">
        <div class="icon-off" style="background-image:url('assets/icons/nav-weekly-off.png');"></div>
        <div class="icon-on"  style="background-image:url('assets/icons/nav-weekly-on.png');"></div>
      </div>
      <span class="nav-label">每周推荐</span>
    </a>
    <a class="nav-item" data-key="dream" href="dream.html" title="时光之镜">
      <div class="nav-icon-wrap">
        <div class="icon-off" style="background-image:url('assets/icons/nav-dream-off.png');"></div>
        <div class="icon-on"  style="background-image:url('assets/icons/nav-dream-on.png');"></div>
      </div>
      <span class="nav-label">时光之镜</span>
    </a>
    <a class="nav-item" data-key="rp" href="rp.html" title="RP房">
      <div class="nav-icon-wrap">
        <div class="icon-off" style="background-image:url('assets/icons/nav-rp-off.png');"></div>
        <div class="icon-on"  style="background-image:url('assets/icons/nav-rp-on.png');"></div>
      </div>
      <span class="nav-label">RP房</span>
    </a>
    <a class="nav-item" data-key="mine" href="mine.html" title="我的">
      <div class="nav-icon-wrap">
        <div class="icon-off" style="background-image:url('assets/icons/nav-mine-off.png');"></div>
        <div class="icon-on"  style="background-image:url('assets/icons/nav-mine-on.png');"></div>
      </div>
      <span class="nav-label">我的</span>
    </a>
    <a class="nav-item" data-key="message" href="message.html" title="消息中心">
      <div class="nav-icon-wrap">
        <div class="icon-off" style="background-image:url('assets/icons/nav-message-off.png');"></div>
        <div class="icon-on"  style="background-image:url('assets/icons/nav-message-on.png');"></div>
      </div>
      <span class="nav-label">消息中心</span>
    </a>
  </aside>

  <!-- ===== 主区 ===== -->
  <main class="main">
    <div class="paper-board">
      <section class="cards-area">
        <div class="cards-grid" id="grid"></div>
      </section>
    </div>
  </main>

</div>

<script>
const items = [
  { kind:'live',  label:'玩法标签', cover:'assets/img/card-cover-live.png',  online:'0/6',     title:'直播标题支持最长十二个字' },
  { kind:'dream', label:'玩法标签', cover:'assets/img/card-cover-dream.png', current:9999, likes:9999, stars:9999, title:'家装标题支持最长十二个字' },
  { kind:'live',  label:'玩法标签', cover:'assets/img/card-cover-live.png',  online:'0/6',     title:'直播标题支持最长十二个字' },
  { kind:'dream', label:'玩法标签', cover:'assets/img/card-cover-dream.png', current:9999, likes:9999, stars:9999, title:'家装标题支持最长十二个字' },
  { kind:'live',  label:'玩法标签', cover:'assets/img/card-cover-live.png',  online:'0/6',     title:'直播标题支持最长十二个字' },
  { kind:'dream', label:'玩法标签', cover:'assets/img/card-cover-dream.png', current:9999, likes:9999, stars:9999, title:'家装标题支持最长十二个字' },
  { kind:'live',  label:'玩法标签', cover:'assets/img/card-cover-live.png',  online:'0/6',     title:'直播标题支持最长十二个字' },
  { kind:'dream', label:'玩法标签', cover:'assets/img/card-cover-dream.png', current:9999, likes:9999, stars:9999, title:'家装标题支持最长十二个字' },
  { kind:'live',  label:'玩法标签', cover:'assets/img/card-cover-live.png',  online:'0/6',     title:'直播标题支持最长十二个字' },
];

document.getElementById('grid').innerHTML = items.map(it => {
  const stats = it.kind === 'live'
    ? `
      <div class="card-stats">
        <span class="stat">在线人数9999</span>
        <span class="stat-right">
          <span class="stat"><img src="assets/img/stat-people.png" alt=""> ${it.online}</span>
        </span>
      </div>
    `
    : `
      <div class="card-stats">
        <span class="stat">当前在玩${it.current}</span>
        <span class="stat-right">
          <span class="stat"><img src="assets/img/stat-like.png" alt=""> ${it.likes}</span>
          <span class="stat"><img src="assets/img/stat-star.png" alt=""> ${it.stars}</span>
        </span>
      </div>
    `;

  return `
    <article class="card">
      <div class="card-cover" style="background-image:url('${it.cover}');">
        <div class="card-tag-left">${it.label}</div>
        ${stats}
      </div>
      <div class="card-tag-featured">精选</div>
      <div class="card-title-bar">
        <div class="avatar"></div>
        <div class="title">${it.title}</div>
      </div>
    </article>
  `;
}).join('');

let filterActive = false;
const fimg = document.querySelector('#filterBtn img');
document.getElementById('filterBtn').onclick = () => {
  filterActive = !filterActive;
  fimg.src = filterActive
    ? 'assets/img/btn-filter-active.png'
    : 'assets/img/btn-filter-default.png';
};
</script>

</body>
</html>
